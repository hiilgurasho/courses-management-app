<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses Management Library</title>
    <style>
        /* Removes all borders and margins, making the app take over the entire screen */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: #1a202c; /* Matches your login background */
        }
        
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        /* --- PRELOADER STYLES --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a202c; /* Seamlessly matches the background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Ensures it stays on top of the iframe */
            transition: opacity 0.5s ease; /* Smooth fade-out effect */
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); /* Subtle dark ring */
            border-left-color: #fbc02d; /* Matches the yellow login button */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <iframe id="appFrame" src="about:blank"></iframe>

    <script>
        // 🛑 PASTE YOUR DEPLOYED GOOGLE APPS SCRIPT URL HERE:
        // Make sure it ends in /exec
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbzqTXiWZGVMDsOrHsTD_-AqkfAFvsAgR6vb8lrkJLt4NUKX4bAW3I15L0oulWRqp_fzkw/exec';
        
        const iframe = document.getElementById('appFrame');
        const preloader = document.getElementById('preloader');

        // This listens for the iframe to finish loading its initial content
        iframe.onload = () => {
            // Check if the iframe is no longer on 'about:blank'
            if (iframe.src !== 'about:blank' && iframe.src !== '') {
                // Fade out the preloader smoothly
                preloader.style.opacity = '0';
                
                // Remove it entirely from the screen so it doesn't block clicks
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 500); // Wait 500ms for the CSS opacity transition to finish
            }
        };

        // Loads the app dynamically, passing along any URL parameters
        window.onload = () => {
            iframe.src = webAppUrl + window.location.search;
        };
    </script>

</body>
</html>
